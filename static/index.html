<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Thing</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --bar-h: 2.2rem; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #0a0a0a;
      color: #d4cfc7;
      display: flex;
      flex-direction: column;
    }

    /* =============================================
       TALL MODE (default) — portrait / square
       Video at 16:9 top, channel list scrolls below
       ============================================= */
    .player-col {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .screen {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    video {
      width: 100%; height: 100%;
      display: block;
      object-fit: contain;
    }
    .no-signal {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px
      );
    }

    /* Control bar */
    .control-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0 0.75rem;
      height: var(--bar-h);
      background: #0f0f0f;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3a3530;
    }
    .bar-sep { width: 1px; height: 12px; background: #222; }
    .quality-pills {
      display: flex;
      border: 1px solid #333;
      border-radius: 999px;
      overflow: hidden;
    }
    .quality-pill {
      padding: 0.2rem 0.6rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      background: #1a1a1a;
      color: #777;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      border-right: 1px solid #333;
    }
    .quality-pill:last-child { border-right: none; }
    .quality-pill:hover { background: #222; color: #aaa; }
    .quality-pill.active { background: #2a2520; color: #b8a070; }
    #status {
      color: #555;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-spacer { flex: 1; }
    .bar-link {
      color: #383838;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.6rem;
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .bar-link:hover { color: #8a7a5a; }
    #stop-btn {
      padding: 0.2rem 0.7rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #1a1a1a;
      color: #888;
      border: 1px solid #333;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #stop-btn:hover { background: #252525; color: #aaa; }

    /* Channel toggle button — hidden in tall mode */
    #ch-toggle { display: none; }

    /* Channel list — tall mode: normal flow, scrollable */
    .channel-list {
      overflow-y: auto;
      background: #0f0f0f;
      border-top: 1px solid #222;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .ch-btn {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.5rem 0.7rem;
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      color: #888;
      cursor: pointer;
      transition: all 0.12s;
      text-align: left;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.8rem;
      line-height: 1.3;
    }
    .ch-btn:last-child { border-bottom: none; }
    .ch-btn:hover { background: #1a1816; color: #ccc; }
    .ch-btn.active { background: #2a2520; color: #b8a070; }
    .ch-num {
      font-weight: 600;
      font-size: 0.75rem;
      min-width: 2.5em;
      opacity: 0.7;
      font-variant-numeric: tabular-nums;
    }
    .ch-btn.active .ch-num { opacity: 1; }
    .ch-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* =============================================
       WIDE MODE — landscape, close to 16:9
       Video fills window, channel list is a
       slide-up panel triggered by a button
       ============================================= */
    @media (min-aspect-ratio: 4/3) {
      html, body { height: 100%; overflow: hidden; }

      .player-col { flex: 1; min-height: 0; position: relative; }

      .screen { aspect-ratio: unset; width: 100%; height: 100%; }

      /* control bar fixed to bottom */
      .control-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 20;
        border-top: 1px solid #1a1a1a;
      }

      /* push video up so it doesn't hide under the bar */
      .screen { padding-bottom: var(--bar-h); }

      /* channel toggle visible */
      #ch-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.2rem 0.7rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: #1a1a1a;
        color: #888;
        border: 1px solid #333;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.15s;
      }
      #ch-toggle:hover { background: #252525; color: #aaa; }
      #ch-toggle.open { background: #2a2520; color: #b8a070; border-color: #4a3f30; }

      /* channel list: slide-up panel fixed above the control bar */
      .channel-list {
        position: fixed;
        left: 0; right: 0;
        bottom: var(--bar-h);
        max-height: 45%;
        overflow-y: auto;
        background: rgba(12, 12, 12, 0.97);
        border-top: 1px solid #333;
        z-index: 15;
        transform: translateY(100%);
        transition: transform 0.25s ease;
      }
      .channel-list.open {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="player-col">
    <div class="screen">
      <video id="player" controls></video>
      <div class="no-signal" id="no-signal">No Signal</div>
    </div>
    <div class="control-bar">
      <span class="brand">tv thing</span>
      <div class="bar-sep"></div>
      <div class="quality-pills">
        <button class="quality-pill" data-quality="low">480p</button>
        <button class="quality-pill active" data-quality="medium">720p</button>
        <button class="quality-pill" data-quality="high">1080p</button>
      </div>
      <span id="status">Loading channels...</span>
      <div class="bar-spacer"></div>
      <button id="ch-toggle">&#9776; Channels</button>
      <a class="bar-link" href="/rescan.html">Re-scan</a>
      <a class="bar-link" href="/about.html">About</a>
      <button id="stop-btn">Stop</button>
    </div>
    <div class="channel-list" id="channel-list"></div>
  </div>

  <script src="/hls.min.js"></script>
  <script>
    const channelList = document.getElementById("channel-list");
    const chToggle = document.getElementById("ch-toggle");
    const qualityPills = document.querySelectorAll(".quality-pill");
    const stopBtn = document.getElementById("stop-btn");
    const video = document.getElementById("player");
    const statusEl = document.getElementById("status");
    const noSignal = document.getElementById("no-signal");

    let hls = null;
    let channels = [];
    let currentChannelId = null;
    let currentQuality = "medium";

    const wideQuery = window.matchMedia("(min-aspect-ratio: 4/3)");

    function isWide() { return wideQuery.matches; }

    function openChannelList() {
      channelList.classList.add("open");
      chToggle.classList.add("open");
    }
    function closeChannelList() {
      channelList.classList.remove("open");
      chToggle.classList.remove("open");
    }
    function toggleChannelList() {
      channelList.classList.toggle("open");
      chToggle.classList.toggle("open");
    }

    chToggle.addEventListener("click", toggleChannelList);

    // Keyboard: 'c' toggles in wide mode, Escape closes
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (!isWide()) return;
      if (e.key === "c" || e.key === "C") toggleChannelList();
      else if (e.key === "Escape") closeChannelList();
    });

    async function loadChannels() {
      try {
        const res = await fetch("/api/channels");
        channels = await res.json();
        channelList.innerHTML = "";

        channels.forEach(ch => {
          const btn = document.createElement("button");
          btn.className = "ch-btn";
          btn.dataset.id = ch.id;
          btn.innerHTML = `<span class="ch-num">${ch.number}</span><span class="ch-name">${ch.name}</span>`;
          btn.addEventListener("click", () => {
            tune(ch.id);
            if (isWide()) closeChannelList();
          });
          channelList.appendChild(btn);
        });

        statusEl.textContent = `${channels.length} channels`;
      } catch (e) {
        statusEl.textContent = "Failed to load channels";
      }
    }

    function setActiveChannel(id) {
      currentChannelId = id;
      channelList.querySelectorAll(".ch-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.id === id);
      });
    }

    async function tune(channelId) {
      setActiveChannel(channelId);
      statusEl.textContent = "Tuning...";

      try {
        const res = await fetch("/api/tune", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({channel_id: channelId, quality: currentQuality}),
        });
        const data = await res.json();
        if (data.ok) {
          statusEl.textContent = `${data.channel.name} \u2014 buffering...`;
          setTimeout(() => startPlayback(), 5000);
        } else {
          statusEl.textContent = `Error: ${data.error}`;
        }
      } catch (e) {
        statusEl.textContent = "Failed to tune";
      }
    }

    function startPlayback() {
      noSignal.style.display = "none";
      const streamUrl = "/stream/live.m3u8";

      if (hls) { hls.destroy(); hls = null; }

      if (Hls.isSupported()) {
        hls = new Hls({
          liveDurationInfinity: true,
          liveBackBufferLength: 0,
          maxBufferLength: 10,
          maxMaxBufferLength: 20,
        });
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) setTimeout(() => startPlayback(), 3000);
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamUrl;
        video.play();
      }
    }

    qualityPills.forEach(pill => {
      pill.addEventListener("click", () => {
        qualityPills.forEach(p => p.classList.remove("active"));
        pill.classList.add("active");
        currentQuality = pill.dataset.quality;
        if (currentChannelId) tune(currentChannelId);
      });
    });

    stopBtn.addEventListener("click", async () => {
      if (hls) { hls.destroy(); hls = null; }
      video.src = "";
      noSignal.style.display = "flex";
      currentChannelId = null;
      channelList.querySelectorAll(".ch-btn").forEach(btn => btn.classList.remove("active"));
      await fetch("/api/stop", {method: "POST"});
      statusEl.textContent = "Stopped";
    });

    async function checkStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        if (data.streaming && data.channel) {
          currentChannelId = data.channel.id;
          currentQuality = data.quality || "medium";
          qualityPills.forEach(p => {
            p.classList.toggle("active", p.dataset.quality === currentQuality);
          });
          setActiveChannel(data.channel.id);
          startPlayback();
          statusEl.textContent = data.channel.name || "Playing";
        }
      } catch (e) {}
    }

    loadChannels().then(() => checkStatus());
  </script>
</body>
</html>
